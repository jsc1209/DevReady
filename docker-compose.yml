services:
  mysql:
    image: mysql:8.0
    container_name: devready-mysql
    environment:
      MYSQL_ROOT_PASSWORD: devready
      MYSQL_DATABASE: devready
      MYSQL_USER: devready
      MYSQL_PASSWORD: devready
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - ./db:/docker-entrypoint-initdb.d        # devready_schema.sql 자동 로드
      - devready_mysql_data:/var/lib/mysql       # 데이터 영속
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

volumes:
  devready_mysql_data:
